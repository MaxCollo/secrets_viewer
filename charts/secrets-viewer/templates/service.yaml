apiVersion: v1
kind: Service
metadata:
  name: {{ include "secrets-viewer.fullname" . }}
  namespace: {{ include "secrets-viewer.namespace" . }}
  labels:
    {{- include "secrets-viewer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "secrets-viewer.selectorLabels" . | nindent 4 }}
