# Default values for secrets-viewer

image:
  repository: secrets-viewer
  tag: "latest"
  pullPolicy: ""

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  host: secrets-viewer.example.com
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  APP_NAME: "secrets-viewer"
  ENVIRONMENT: "development"
  LOG_LEVEL: "info"

secrets:
  DEMO_SECRET: "change-me"

externalSecret:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  target:
    name: ""
  data: []
  # - secretKey: MY_SECRET
  #   remoteRef:
  #     key: my-akv-secret

nodeSelector: {}
tolerations: []
affinity: {}
